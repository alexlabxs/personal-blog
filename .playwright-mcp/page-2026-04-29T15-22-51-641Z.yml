          - generic [ref=e22]:
            - paragraph [ref=e23]:
              - text: 我是
              - strong [ref=e24]: Alex（肖凯瀚）
              - text: ，一名全栈工程师。
            - paragraph [ref=e25]: 过去 10 年，我在保险行业做 Java 后端开发，设计过财务系统、记账引擎、费控管理等核心模块。 我学会了如何设计复杂的业务系统，如何让代码在生产环境稳定运行。
            - paragraph [ref=e26]: 但现在，我在思考一个更大的问题：
            - paragraph [ref=e27]: AI 时代，系统设计会变得更重要还是更不重要？
            - paragraph [ref=e28]:
              - text: 大多数人觉得 AI 会替代工程师。我不这么认为。我认为 AI 让系统设计变得
              - strong [ref=e29]: 更关键
              - text: ——因为 AI 本身就是最难预测、最难驾驭的"组件"。
            - paragraph [ref=e30]: 如何把 AI 集成到生产系统？如何保证可靠性？如何控制成本？ 这些问题，只有懂系统设计的工程师才能回答。
            - paragraph [ref=e31]: 所以我开始写作，记录我的思考：
            - list [ref=e32]:
              - listitem [ref=e33]: → 怎样让 AI 从实验室走向生产环境？
              - listitem [ref=e34]: → 系统设计在 AI 时代有什么新挑战？
              - listitem [ref=e35]: → 工程师需要补充什么产品思维？
            - paragraph [ref=e36]: 欢迎一起探索这些问题。
